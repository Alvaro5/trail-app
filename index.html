<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#18181b" />

    <title>GradePace: grade-adjusted trail race pacing</title>
    <meta
      name="description"
      content="Grade-adjusted race plans from your GPX: per-km pace, climbs, and power-hike splits. All in your browser."
    />

    <!-- Open Graph (Facebook, LinkedIn, Discord, …) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="GradePace" />
    <meta property="og:url" content="https://gradepace.vercel.app/" />
    <meta property="og:title" content="GradePace: grade-adjusted trail race pacing" />
    <meta
      property="og:description"
      content="Grade-adjusted race plans from your GPX: per-km pace, climbs, and power-hike splits. All in your browser."
    />
    <meta property="og:image" content="https://gradepace.vercel.app/og.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="GradePace: grade-adjusted trail race pacing from a GPX file" />

    <!-- Twitter / X card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:creator" content="@AlvaroSerero" />
    <meta name="twitter:title" content="GradePace: grade-adjusted trail race pacing" />
    <meta
      name="twitter:description"
      content="Grade-adjusted race plans from your GPX: per-km pace, climbs, and power-hike splits. All in your browser."
    />
    <meta name="twitter:image" content="https://gradepace.vercel.app/og.png" />

    <!-- Umami analytics (cookieless, ~2 kB). data-domains restricts tracking to
         production, so localhost/dev sessions never pollute the stats — the
         tracker script sees a non-matching domain and disables itself, and the
         track() wrapper in src/lib/analytics.ts no-ops. -->
    <script
      defer
      src="https://cloud.umami.is/script.js"
      data-website-id="661590e1-71ee-4d82-b78e-de2f8cc208a1"
      data-domains="gradepace.vercel.app"
    ></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
